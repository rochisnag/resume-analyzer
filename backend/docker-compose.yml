services:
  postgres:
    image: postgres:15-alpine
    container_name: resume_analyzer_db
    environment:
      POSTGRES_DB: resume_analyzer_db
      POSTGRES_USER: resume_user
      POSTGRES_PASSWORD: resume_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - resume_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U resume_user -d resume_analyzer_db"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  resume_network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
