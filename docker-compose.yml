name: resume-analyzer

services:
  db:
    image: postgres:16
    container_name: resume-analyzer-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: resume_analyzer_db
      POSTGRES_USER: resume_user
      POSTGRES_PASSWORD: resume_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U resume_user -d resume_analyzer_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    container_name: resume-analyzer-backend
    restart: unless-stopped
    env_file:
      - path: ./backend/.env
        required: false
    environment:
      DATABASE_URL: postgresql://resume_user:resume_password@db:5432/resume_analyzer_db
      MAIL_AUTO_POLL_ENABLED: "true"
      MAIL_POLL_INTERVAL_SECONDS: "120"
    ports:
      - "8000:8000"
    volumes:
      - ./backend/uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3)\""]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  frontend:
    build:
      context: ./frontend
    container_name: resume-analyzer-frontend
    restart: unless-stopped
    environment:
      VITE_API_PROXY_TARGET: http://backend:8000
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      backend:
        condition: service_healthy

volumes:
  postgres_data:
